# ============================================================================
# 030 — Pièces jointes de messagerie (image/PDF), cf. DARI Lab.
# ============================================================================
databaseChangeLog:
  - changeSet:
      id: 030-message-attachments
      author: coachrun
      changes:
        - createTable:
            tableName: message_attachments
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: filename, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: content_type, type: VARCHAR(128), constraints: { nullable: false } }
              - column: { name: size_bytes, type: BIGINT, constraints: { nullable: false } }
              - column: { name: data, type: bytea, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: version, type: BIGINT, defaultValueNumeric: 0, constraints: { nullable: false } }
        - addColumn:
            tableName: messages
            columns:
              - column: { name: attachment_id, type: UUID }
              - column: { name: attachment_filename, type: VARCHAR(255) }
              - column: { name: attachment_content_type, type: VARCHAR(128) }
