# ============================================================================
# 036 — Réinitialisation de mot de passe (additif) : jeton + expiration sur users.
# ============================================================================
databaseChangeLog:
  - changeSet:
      id: 036-password-reset
      author: coachrun
      changes:
        - addColumn:
            tableName: users
            columns:
              - column: { name: reset_token, type: VARCHAR(64) }
              - column: { name: reset_expires_at, type: TIMESTAMP }
        - addUniqueConstraint:
            tableName: users
            columnNames: reset_token
            constraintName: uq_users_reset_token
