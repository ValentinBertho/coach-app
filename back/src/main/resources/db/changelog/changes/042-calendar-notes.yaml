# ============================================================================
# 042 — Table "calendar_notes" : notes libres du coach posées sur une date du
# calendrier d'un athlète (chip note, CDC §8). Distinctes des notes de séance.
# ============================================================================
databaseChangeLog:
  - changeSet:
      id: 042-create-calendar-notes
      author: coachrun
      changes:
        - createTable:
            tableName: calendar_notes
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: club_id, type: UUID, constraints: { nullable: false } }
              - column: { name: athlete_id, type: UUID, constraints: { nullable: false } }
              - column: { name: note_date, type: DATE, constraints: { nullable: false } }
              - column: { name: text, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: version, type: BIGINT, defaultValueNumeric: 0, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            constraintName: fk_calendar_notes_club
            baseTableName: calendar_notes
            baseColumnNames: club_id
            referencedTableName: clubs
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_calendar_notes_athlete
            baseTableName: calendar_notes
            baseColumnNames: athlete_id
            referencedTableName: athletes
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_calendar_notes_athlete_date
            tableName: calendar_notes
            columns:
              - column: { name: athlete_id }
              - column: { name: note_date }
