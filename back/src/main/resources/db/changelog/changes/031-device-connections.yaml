# ============================================================================
# 031 — Connexions OAuth objets connectés (Strava…), cf. DARI Lab.
# ============================================================================
databaseChangeLog:
  - changeSet:
      id: 031-device-connections
      author: coachrun
      changes:
        - createTable:
            tableName: device_connections
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: athlete_id, type: UUID, constraints: { nullable: false } }
              - column: { name: provider, type: VARCHAR(16), constraints: { nullable: false } }
              - column: { name: provider_athlete_id, type: VARCHAR(64) }
              - column: { name: access_token, type: VARCHAR(512), constraints: { nullable: false } }
              - column: { name: refresh_token, type: VARCHAR(512), constraints: { nullable: false } }
              - column: { name: expires_at, type: BIGINT, constraints: { nullable: false } }
              - column: { name: scope, type: VARCHAR(255) }
              - column: { name: last_import_epoch, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: version, type: BIGINT, defaultValueNumeric: 0, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            constraintName: fk_device_conn_athlete
            baseTableName: device_connections
            baseColumnNames: athlete_id
            referencedTableName: athletes
            referencedColumnNames: id
            onDelete: CASCADE
