# ============================================================================
# 028 — Suivi de charge force (mécanique/métabolique en UA, cf. DARI Lab §6.6).
# ============================================================================
databaseChangeLog:
  - changeSet:
      id: 028-strength-load-tracking
      author: coachrun
      changes:
        - createTable:
            tableName: strength_load_tracking
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: athlete_id, type: UUID, constraints: { nullable: false } }
              - column: { name: scheduled_session_id, type: UUID }
              - column: { name: session_date, type: DATE, constraints: { nullable: false } }
              - column: { name: mechanical_load, type: "NUMERIC(10,1)", constraints: { nullable: false } }
              - column: { name: metabolic_load, type: "NUMERIC(10,1)", constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: version, type: BIGINT, defaultValueNumeric: 0, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            constraintName: fk_strength_load_athlete
            baseTableName: strength_load_tracking
            baseColumnNames: athlete_id
            referencedTableName: athletes
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_strength_load_athlete_date
            tableName: strength_load_tracking
            columns:
              - column: { name: athlete_id }
              - column: { name: session_date }
