# ============================================================================
# 006 — Table "activities" (réalisé importé). Dédup UNIQUE (athlete, source, external_id).
# ============================================================================
databaseChangeLog:
  - changeSet:
      id: 006-create-activities
      author: coachrun
      changes:
        - createTable:
            tableName: activities
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: club_id
                  type: UUID
                  constraints: { nullable: false }
              - column:
                  name: athlete_id
                  type: UUID
                  constraints: { nullable: false }
              - column:
                  name: source
                  type: VARCHAR(16)
                  constraints: { nullable: false }
              - column: { name: external_id, type: VARCHAR(128) }
              - column:
                  name: activity_date
                  type: DATE
                  constraints: { nullable: false }
              - column: { name: title, type: VARCHAR(255) }
              - column: { name: distance_m, type: INT }
              - column: { name: duration_s, type: INT }
              - column: { name: avg_hr, type: INT }
              - column: { name: elevation_gain_m, type: INT }
              - column:
                  name: status
                  type: VARCHAR(16)
                  constraints: { nullable: false }
              - column: { name: matched_workout_id, type: UUID }
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
        - addForeignKeyConstraint:
            constraintName: fk_activities_club
            baseTableName: activities
            baseColumnNames: club_id
            referencedTableName: clubs
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_activities_athlete
            baseTableName: activities
            baseColumnNames: athlete_id
            referencedTableName: athletes
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            constraintName: uk_activities_dedup
            tableName: activities
            columnNames: athlete_id, source, external_id
        - createIndex:
            indexName: idx_activities_athlete_date
            tableName: activities
            columns:
              - column: { name: athlete_id }
              - column: { name: activity_date }
