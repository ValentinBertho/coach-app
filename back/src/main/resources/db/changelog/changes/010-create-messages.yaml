# ============================================================================
# 010 — Table "messages" (conversation coach ↔ athlète, fil par athlète).
# ============================================================================
databaseChangeLog:
  - changeSet:
      id: 010-create-messages
      author: coachrun
      changes:
        - createTable:
            tableName: messages
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: club_id, type: UUID, constraints: { nullable: false } }
              - column: { name: athlete_id, type: UUID, constraints: { nullable: false } }
              - column: { name: sender_user_id, type: UUID, constraints: { nullable: false } }
              - column: { name: sender_role, type: VARCHAR(16), constraints: { nullable: false } }
              - column: { name: sender_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: body, type: VARCHAR(2000), constraints: { nullable: false } }
              - column: { name: workout_id, type: UUID }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: version, type: BIGINT, defaultValueNumeric: 0, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            constraintName: fk_messages_club
            baseTableName: messages
            baseColumnNames: club_id
            referencedTableName: clubs
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_messages_athlete
            baseTableName: messages
            baseColumnNames: athlete_id
            referencedTableName: athletes
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_messages_athlete
            tableName: messages
            columns:
              - column: { name: athlete_id }
              - column: { name: created_at }
