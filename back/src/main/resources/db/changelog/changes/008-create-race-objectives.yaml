# ============================================================================
# 008 — Table "race_objectives" (courses cibles d'un athlète).
# ============================================================================
databaseChangeLog:
  - changeSet:
      id: 008-create-race-objectives
      author: coachrun
      changes:
        - createTable:
            tableName: race_objectives
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: club_id, type: UUID, constraints: { nullable: false } }
              - column: { name: athlete_id, type: UUID, constraints: { nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: race_date, type: DATE, constraints: { nullable: false } }
              - column: { name: distance_m, type: INT }
              - column: { name: target_time_s, type: INT }
              - column: { name: priority, type: VARCHAR(1), constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(16), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: version, type: BIGINT, defaultValueNumeric: 0, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            constraintName: fk_races_club
            baseTableName: race_objectives
            baseColumnNames: club_id
            referencedTableName: clubs
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_races_athlete
            baseTableName: race_objectives
            baseColumnNames: athlete_id
            referencedTableName: athletes
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_races_athlete_date
            tableName: race_objectives
            columns:
              - column: { name: athlete_id }
              - column: { name: race_date }
