# ============================================================================
# 004 — Tables "workouts" (séances prescrites) et "workout_steps" (étapes).
# Index (athlete_id, scheduled_date) pour le calendrier et (club_id, status).
# ============================================================================
databaseChangeLog:
  - changeSet:
      id: 004-create-workouts
      author: coachrun
      changes:
        - createTable:
            tableName: workouts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: club_id
                  type: UUID
                  constraints: { nullable: false }
              - column:
                  name: athlete_id
                  type: UUID
                  constraints: { nullable: false }
              - column:
                  name: scheduled_date
                  type: DATE
                  constraints: { nullable: false }
              - column:
                  name: type
                  type: VARCHAR(32)
                  constraints: { nullable: false }
              - column:
                  name: status
                  type: VARCHAR(16)
                  constraints: { nullable: false }
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints: { nullable: false }
              - column: { name: notes, type: VARCHAR(2048) }
              - column: { name: target_distance_m, type: INT }
              - column: { name: target_duration_s, type: INT }
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
        - addForeignKeyConstraint:
            constraintName: fk_workouts_club
            baseTableName: workouts
            baseColumnNames: club_id
            referencedTableName: clubs
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_workouts_athlete
            baseTableName: workouts
            baseColumnNames: athlete_id
            referencedTableName: athletes
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_workouts_athlete_date
            tableName: workouts
            columns:
              - column: { name: athlete_id }
              - column: { name: scheduled_date }
        - createIndex:
            indexName: idx_workouts_club_status
            tableName: workouts
            columns:
              - column: { name: club_id }
              - column: { name: status }

        - createTable:
            tableName: workout_steps
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: workout_id
                  type: UUID
                  constraints: { nullable: false }
              - column:
                  name: order_index
                  type: INT
                  constraints: { nullable: false }
              - column:
                  name: step_type
                  type: VARCHAR(16)
                  constraints: { nullable: false }
              - column:
                  name: repetitions
                  type: INT
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              - column: { name: zone, type: VARCHAR(4) }
              - column: { name: distance_m, type: INT }
              - column: { name: duration_s, type: INT }
              - column: { name: notes, type: VARCHAR(512) }
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
        - addForeignKeyConstraint:
            constraintName: fk_workout_steps_workout
            baseTableName: workout_steps
            baseColumnNames: workout_id
            referencedTableName: workouts
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_workout_steps_workout
            tableName: workout_steps
            columns:
              - column: { name: workout_id }
