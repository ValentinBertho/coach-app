# ============================================================================
# Nginx — sert le build Angular (SPA) et proxifie /api vers le backend (Docker).
# Copié dans /etc/nginx/conf.d/default.conf par le Dockerfile.
# ============================================================================
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API → backend (réseau docker-compose). Conserve le préfixe /api.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Le service worker ne doit pas être mis en cache agressivement.
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache";
    }

    # Fallback SPA : toute route inconnue renvoie index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
