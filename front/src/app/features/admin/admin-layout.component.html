<div class="layout">
  <header class="topbar">
    <div class="brand">
      <app-logo [size]="28" [showText]="false" />
      <span class="logo">CoachRun</span>
      <span class="badge badge-danger">Admin</span>
    </div>
    <nav class="nav">
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a routerLink="/admin/clubs" routerLinkActive="active">Clubs</a>
      <a routerLink="/admin/users" routerLinkActive="active">Utilisateurs</a>
      <a routerLink="/admin/athletes" routerLinkActive="active">Athlètes</a>
      <a routerLink="/admin/invitations" routerLinkActive="active">Invitations</a>
    </nav>
    <div class="user">
      <span class="user-name">{{ user()?.fullName }}</span>
      <button type="button" class="btn btn-ghost btn-sm" (click)="logout()">Déconnexion</button>
    </div>
  </header>

  <app-offline-banner />

  <main class="content container-wide">
    <router-outlet />
  </main>
</div>
