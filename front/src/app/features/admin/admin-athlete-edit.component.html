<section class="page-header">
  <div><h1 class="display-sm">Éditer l'athlète</h1></div>
  <a routerLink="/admin/athletes" class="btn btn-ghost">Retour</a>
</section>

@if (loading()) {
  <div class="card">Chargement…</div>
} @else {
  <form class="card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-row">
      <div class="form-group"><label>Prénom *</label><input class="form-control" formControlName="firstName" /></div>
      <div class="form-group"><label>Nom *</label><input class="form-control" formControlName="lastName" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input class="form-control" formControlName="email" /></div>
      <div class="form-group">
        <label>Statut</label>
        <select class="form-control" formControlName="status">
          <option value="ACTIVE">ACTIVE</option>
          <option value="PAUSED">PAUSED</option>
          <option value="ARCHIVED">ARCHIVED</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Sexe</label>
        <select class="form-control" formControlName="sex">
          <option value="">—</option><option value="FEMALE">Femme</option>
          <option value="MALE">Homme</option><option value="OTHER">Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Niveau</label>
        <select class="form-control" formControlName="level">
          <option value="">—</option><option value="BEGINNER">Débutant</option>
          <option value="INTERMEDIATE">Intermédiaire</option><option value="ADVANCED">Avancé</option>
          <option value="ELITE">Élite</option>
        </select>
      </div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>FC max</label><input type="number" class="form-control" formControlName="hrMax" /></div>
      <div class="form-group"><label>FC repos</label><input type="number" class="form-control" formControlName="hrRest" /></div>
      <div class="form-group"><label>VMA</label><input type="number" step="0.1" class="form-control" formControlName="vma" /></div>
    </div>
    <div class="form-group"><label>Poids (kg)</label><input type="number" step="0.1" class="form-control" formControlName="weightKg" /></div>
    <div class="form-group"><label>Notes médicales 🔒</label><textarea rows="2" class="form-control" formControlName="medicalNotes"></textarea></div>
    <button type="submit" class="btn btn-primary btn-lg" [disabled]="submitting()">Enregistrer</button>
  </form>
}
