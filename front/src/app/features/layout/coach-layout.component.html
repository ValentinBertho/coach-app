<div class="layout">
  <header class="topbar">
    <div class="brand">
      <app-logo [size]="30" [showText]="true" />
      @if (user()?.clubName) {
        <span class="badge badge-neutral club-badge">{{ user()?.clubName }}</span>
      }
    </div>

    <nav class="nav desktop-only">
      <a routerLink="/app" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Tableau de bord</a>
      <a routerLink="/app/athletes" routerLinkActive="active">Athlètes</a>
      <a routerLink="/app/groups" routerLinkActive="active">Groupes</a>
      <a routerLink="/app/calendar" routerLinkActive="active">Calendrier</a>
      <a routerLink="/app/templates" routerLinkActive="active">Bibliothèque</a>
      <a routerLink="/app/strength" routerLinkActive="active">Prépa physique</a>
      <a routerLink="/app/club" routerLinkActive="active">Club</a>
      <a routerLink="/app/sync" routerLinkActive="active">Synchros</a>
      <a routerLink="/app/settings" routerLinkActive="active">Paramètres</a>
    </nav>

    <div class="user">
      @if (user(); as u) { <span class="user-name desktop-only">{{ u.fullName }}</span> }
      <app-push-button />
      <button type="button" class="btn btn-ghost btn-sm" (click)="logout()">Déconnexion</button>
    </div>
  </header>

  <app-offline-banner />

  <main class="content container-wide">
    <router-outlet />
  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav mobile-only">
    <a routerLink="/app" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <span class="bn-ic">🏠</span><span class="bn-lb">Accueil</span>
    </a>
    <a routerLink="/app/athletes" routerLinkActive="active">
      <span class="bn-ic">👥</span><span class="bn-lb">Athlètes</span>
    </a>
    <a routerLink="/app/calendar" routerLinkActive="active">
      <span class="bn-ic">📅</span><span class="bn-lb">Calendrier</span>
    </a>
  </nav>
</div>
