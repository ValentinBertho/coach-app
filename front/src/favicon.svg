<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3D5AFE"/>
      <stop offset="1" stop-color="#2D45D6"/>
    </linearGradient>
  </defs>
  <!-- App icon background (squircle, safe for maskable) -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <!-- Ascending pace path (stride) -->
  <path d="M250 720 C 420 700, 540 580, 770 360"
        stroke="#FFFFFF" stroke-width="76" stroke-linecap="round" fill="none"/>
  <!-- Speed lines -->
  <path d="M250 560 L 360 560" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" opacity="0.55"/>
  <path d="M250 640 L 320 640" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" opacity="0.35"/>
  <!-- Leading runner dot (accent green) -->
  <circle cx="788" cy="338" r="86" fill="#16C47F"/>
  <circle cx="788" cy="338" r="86" stroke="#FFFFFF" stroke-width="22" fill="none"/>
</svg>
